[build]
  # `nuxt build` (not `generate`) so Nitro deploys server endpoints
  # (server/api/*) as Netlify Functions. Static pages listed in
  # nuxt.config.ts → nitro.prerender.routes are still pre-rendered.
  # Hybrid model: fast static pages + working API routes.
  #
  # Output structure (with NITRO_PRESET=netlify):
  #   - dist/                              ← static assets (publish dir)
  #   - .netlify/functions-internal/server ← serverless function (auto-discovered)
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Force the Netlify preset explicitly. Nitro normally auto-detects via
  # NETLIFY=true, but we set it here defensively so the build can never
  # silently fall back to the generic Node preset (which would skip the
  # functions wiring).
  NITRO_PRESET = "netlify"

# Route every non-static path to the Nitro server function. Netlify checks
# the redirects AFTER trying to serve a static file from `publish`, so
# pre-rendered routes (/, /buy/, /news/) and asset URLs hit the CDN directly
# and only API endpoints (and any non-prerendered route) fall through here.
# Nitro generates an empty _redirects file when all visible routes are
# pre-rendered, so we wire this fallback explicitly.
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200

[[redirects]]
  from = "https://www.s3explorer.accessdevops.com/*"
  to = "https://s3explorer.accessdevops.com/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/_nuxt/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
