[build]
  # `nuxt build` (not `generate`) so Nitro deploys server endpoints
  # (server/api/*) as Netlify Functions. Static pages listed in
  # nuxt.config.ts → nitro.prerender.routes are still pre-rendered.
  # Hybrid model: fast static pages + working API routes.
  #
  # Output structure (with NITRO_PRESET=netlify):
  #   - dist/                              ← static assets (publish dir)
  #   - .netlify/functions-internal/server ← serverless function (auto-discovered)
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Force the Netlify preset explicitly. Nitro normally auto-detects via
  # NETLIFY=true, but we set it here defensively so the build can never
  # silently fall back to the generic Node preset (which would skip the
  # functions wiring).
  NITRO_PRESET = "netlify"

# PostHog reverse proxy. Routes /relay-Bn3Q/* through our own domain so
# adblockers (uBlock Origin, Brave Shields, Firefox Strict, NextDNS, etc.)
# don't filter analytics traffic the way they do for *.posthog.com.
# PostHog's recommended pattern; the random-looking suffix in the path
# makes it harder for filter lists to target a generic /relay-* rule.
# Static assets and the API are on different PostHog subdomains, hence
# two rules. force=true ensures the rewrite always fires regardless of
# whether a static file exists at the path.
#
# IMPORTANT: these MUST come before the /* → function catch-all below,
# otherwise Netlify routes the proxy paths into the Nitro function.
[[redirects]]
  from = "/relay-Bn3Q/static/*"
  to = "https://eu-assets.i.posthog.com/static/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/relay-Bn3Q/*"
  to = "https://eu.i.posthog.com/:splat"
  status = 200
  force = true

# Route every non-static path to the Nitro server function. Netlify checks
# the redirects AFTER trying to serve a static file from `publish`, so
# pre-rendered routes (/, /buy/, /news/) and asset URLs hit the CDN directly
# and only API endpoints (and any non-prerendered route) fall through here.
# Nitro generates an empty _redirects file when all visible routes are
# pre-rendered, so we wire this fallback explicitly.
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200

[[redirects]]
  from = "https://www.s3explorer.accessdevops.com/*"
  to = "https://s3explorer.accessdevops.com/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/_nuxt/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
